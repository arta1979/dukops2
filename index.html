            z-index: 100;

    <script>
        // ==================== GOOGLE APPS SCRIPT CONFIG ====================
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz-3Z-mRq7JLe-d4B85LY4A_rC4fDfeFmM6OelRl24FfEjeN-MW05Qk69fQyPF8w7bS/exec"; // Ganti dengan URL Apps Script Anda
        
        // ==================== GLOBAL VARIABLES ====================
        let img = new Image();
        let selectedDesa = "";
        let selectedCoord = "";
        let selectedDate = new Date();
        let narasiText = "";
        let appVersion = "1.0.0";
        let deferredPrompt;

        // Daftar desa
        const desaList = [
            "Desa Ambengan", "Desa Git Git", "Desa Kayu Putih", "Desa Kendran",
            "Desa Panji", "Desa Pegadungan", "Desa Pegayaman", "Desa Sambangan",
            "Desa Selat", "Desa Silangjana", "Desa Sudaji", "Kelurahan Sukasada",
            "Desa Tegallinggah", "Desa Tejakula", "Desa Tembok"
        ];

        // Koordinat untuk setiap desa
        const coordData = {
            "Desa Ambengan": ["-8.1423, 115.1521", "-8.1430, 115.1530", "-8.1415, 115.1515"],
            "Desa Git Git": ["-8.1478, 115.1389", "-8.1485, 115.1395", "-8.1470, 115.1380"],
            "Desa Kayu Putih": ["-8.1512, 115.1287", "-8.1520, 115.1295", "-8.1505, 115.1280"],
            "Desa Kendran": ["-8.1378, 115.1289", "-8.1385, 115.1295", "-8.1370, 115.1280"],
            "Desa Panji": ["-8.1423, 115.1421", "-8.1430, 115.1430", "-8.1415, 115.1415"],
            "Desa Pegadungan": ["-8.1542, 115.1187", "-8.1550, 115.1195", "-8.1535, 115.1180"],
            "Desa Pegayaman": ["-8.1312, 115.1254", "-8.1320, 115.1260", "-8.1305, 115.1245"],
            "Desa Sambangan": ["-8.1445, 115.1312", "-8.1452, 115.1320", "-8.1438, 115.1305"],
            "Desa Selat": ["-8.1523, 115.1423", "-8.1530, 115.1430", "-8.1515, 115.1415"],
            "Desa Silangjana": ["-8.1389, 115.1356", "-8.1395, 115.1365", "-8.1380, 115.1345"],
            "Desa Sudaji": ["-8.1412, 115.1212", "-8.1420, 115.1220", "-8.1405, 115.1205"],
            "Kelurahan Sukasada": ["-8.1489, 115.1345", "-8.1495, 115.1355", "-8.1480, 115.1335"],
            "Desa Tegallinggah": ["-8.1456, 115.1412", "-8.1465, 115.1420", "-8.1445, 115.1405"],
            "Desa Tejakula": ["-8.1321, 115.1489", "-8.1330, 115.1495", "-8.1315, 115.1480"],
            "Desa Tembok": ["-8.1356, 115.1456", "-8.1365, 115.1465", "-8.1345, 115.1445"]
        };

        // ==================== PWA SERVICE WORKER ====================
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(registration => {
                        console.log('ServiceWorker registered:', registration.scope);
                        
                        // Cek update setiap 30 menit
                        setInterval(() => {
                            registration.update();
                        }, 30 * 60 * 1000);
                        
                        // Cek update saat aplikasi aktif
                        registration.addEventListener('updatefound', () => {
                            const newWorker = registration.installing;
                            newWorker.addEventListener('statechange', () => {
                                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                    document.getElementById('updateNotification').style.display = 'flex';
                                }
                            });
                        });
                    })
                    .catch(err => console.error('ServiceWorker registration failed:', err));
            });

            // Listen for new service worker
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                window.location.reload();
            });
        }

        // ==================== PWA INSTALL PROMPT ====================
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('installButton').style.display = 'flex';
            
            document.getElementById('installButton').addEventListener('click', () => {
                document.getElementById('installButton').style.display = 'none';
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then((choiceResult) => {
                    if (choiceResult.outcome === 'accepted') {
                        console.log('User accepted install');
                    }
                    deferredPrompt = null;
                });
            });
        });

        // ==================== UPDATE APP ====================
        window.updateApp = function() {
            document.getElementById('updateNotification').style.display = 'none';
            if (navigator.serviceWorker && navigator.serviceWorker.controller) {
                navigator.serviceWorker.controller.postMessage({ action: 'skipWaiting' });
            }
        };

        // ==================== CHECK FOR UPDATES ====================
        async function checkForUpdates() {
            try {
                const response = await fetch('version.json?t=' + Date.now());
                if (response.ok) {
                    const data = await response.json();
                    if (data.version && data.version !== appVersion) {
                        appVersion = data.version;
                        document.getElementById('versionInfo').textContent = 'v' + appVersion;
                        // Trigger update jika versi berbeda
                        if (navigator.serviceWorker && navigator.serviceWorker.controller) {
                            navigator.serviceWorker.controller.postMessage({ 
                                action: 'checkUpdate',
                                version: appVersion 
                            });
                        }
                    }
                }
            } catch (e) {
                console.log('Version check failed:', e);
            }
        }

        // ==================== GOOGLE APPS SCRIPT FUNCTIONS ====================
        async function callAppsScript(action, data = {}) {
            try {
                const response = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors', // Karena Apps Script membutuhkan no-cors
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: new URLSearchParams({
                        action: action,
                        ...data
                    })
                });
                
                console.log('Apps Script called:', action);
                return { success: true };
                
            } catch (error) {
                console.error('Apps Script error:', error);
                return { success: false, error: error.message };
            }
        }

        // ==================== UPLOAD TO TELEGRAM & DRIVE ====================
        async function uploadToTelegramAndDrive(fileData, fileName, desaName) {
            const result = await callAppsScript('sendTelegram', {
                fileName: fileName,
                fileData: fileData,
                desaName: desaName,
                mimeType: 'application/zip'
            });
            
            if (result.success) {
                // Juga upload ke Drive
                await callAppsScript('uploadDrive', {
                    fileName: fileName,
                    fileData: fileData,
                    desa: desaName,
                    mimeType: 'application/zip'
                });
            }
            
            return result;
        }

        // ==================== GET CONFIG FROM APPS SCRIPT ====================
        async function getConfig() {
            try {
                const response = await fetch(APPS_SCRIPT_URL + '?action=getConfig&t=' + Date.now());
                if (response.ok) {
                    const data = await response.json();
                    console.log('Config loaded:', data);
                    return data;
                }
            } catch (e) {
                console.log('Config load failed:', e);
            }
            return null;
        }

        // ==================== INITIALIZATION ====================
        document.addEventListener('DOMContentLoaded', async function() {
            // Load config dari Apps Script
            const config = await getConfig();
            if (config && config.config && config.config.system) {
                console.log('System name:', config.config.system.name);
                // Bisa update target laporan dll dari config
            }
            
            // Load desa ke dropdown
            const selectDesa = document.getElementById('selectDesa');
            desaList.forEach(desa => {
                selectDesa.add(new Option(desa, desa));
            });

            // Set default date
            const now = new Date();
            selectedDate = now;
            document.getElementById('tanggalWaktu').value = now.toISOString().slice(0, 16);
            
            // Update stamp dan canvas
            updateStampInfo();
            drawDefaultCanvas();

            // Cek update versi
            checkForUpdates();
            setInterval(checkForUpdates, 60 * 60 * 1000); // Cek setiap jam

            // Splash screen
            let progress = 0;
            const interval = setInterval(() => {
                progress += 10;
                document.getElementById('splashProgress').style.width = progress + '%';
                if (progress >= 100) {
                    clearInterval(interval);
                    setTimeout(() => {
                        document.getElementById('splashScreen').style.display = 'none';
                        document.getElementById('mainMenu').classList.remove('hidden');
                    }, 500);
                }
            }, 200);
        });

        // ==================== FUNGSI KOORDINAT OTOMATIS ====================
        function getRandomCoordForDesa(desa) {
            if (coordData[desa] && coordData[desa].length > 0) {
                const randomIndex = Math.floor(Math.random() * coordData[desa].length);
                return coordData[desa][randomIndex];
            }
            return "-8.1489, 115.1345";
        }

        // ==================== UPDATE STAMP INFO ====================
        function updateStampInfo() {
            document.getElementById('stampDesa').textContent = selectedDesa || '-';
            
            if (selectedDesa) {
                selectedCoord = getRandomCoordForDesa(selectedDesa);
                document.getElementById('stampCoord').textContent = selectedCoord;
                document.getElementById('coordDisplay').textContent = selectedCoord;
            } else {
                document.getElementById('stampCoord').textContent = '-';
                document.getElementById('coordDisplay').textContent = 'Pilih desa untuk koordinat';
            }
            
            if (selectedDate) {
                const options = { day: '2-digit', month: '2-digit', year: 'numeric' };
                const timeOptions = { hour: '2-digit', minute: '2-digit', second: '2-digit' };
                
                document.getElementById('stampTanggal').textContent = selectedDate.toLocaleDateString('id-ID', options);
                document.getElementById('stampJam').textContent = selectedDate.toLocaleTimeString('id-ID', timeOptions);
            }
            
            updateMainCanvas();
        }

        // ==================== CANVAS FUNCTIONS ====================
        function drawDefaultCanvas() {
            const canvas = document.getElementById('mainCanvas');
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = '#0a120a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#9fd49f';
            ctx.font = 'bold 22px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('DUKOPS', canvas.width/2, canvas.height/2 - 15);
            
            ctx.font = '14px Arial';
            ctx.fillStyle = '#b0b0b0';
            ctx.fillText('KORAMIL 1609-05/SUKASADA', canvas.width/2, canvas.height/2 + 15);
        }

        function updateMainCanvas() {
            const canvas = document.getElementById('mainCanvas');
            const ctx = canvas.getContext('2d');
            
            if (img.src && img.complete) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                
                ctx.fillStyle = 'white';
                ctx.font = 'bold 16px Arial';
                ctx.textAlign = 'right';
                ctx.shadowColor = 'black';
                ctx.shadowBlur = 5;
                
                const desa = selectedDesa || 'Pilih Desa';
                const coord = selectedCoord || '-';
                
                if (selectedDate) {
                    const options = { 
                        day: '2-digit', 
                        month: '2-digit', 
                        year: 'numeric',
                        hour: '2-digit',
                        minute: '2-digit',
                        second: '2-digit'
                    };
                    const dateStr = selectedDate.toLocaleDateString('id-ID', options).replace(/\//g, '-');
                    
                    ctx.fillText(desa, canvas.width - 10, canvas.height - 80);
                    ctx.fillText(coord, canvas.width - 10, canvas.height - 55);
                    ctx.fillText(dateStr, canvas.width - 10, canvas.height - 30);
                } else {
                    ctx.fillText(desa, canvas.width - 10, canvas.height - 55);
                    ctx.fillText(coord, canvas.width - 10, canvas.height - 30);
                }
                
                ctx.shadowColor = 'transparent';
            } else {
                drawDefaultCanvas();
            }
        }

        // ==================== UPDATE RUNNING TEXT ====================
        function updateNarasi() {
            narasiText = document.getElementById('narasi').value;
            const runningText = document.getElementById('runningText');
            runningText.innerHTML = `<i class="fas fa-chevron-right"></i> ${narasiText || 'Belum ada narasi'} <i class="fas fa-chevron-left"></i>`;
        }

        // ==================== FORM NAVIGATION ====================
        function openForm(formName) {
            document.getElementById('mainMenu').classList.add('hidden');
            document.getElementById('formDesa').classList.remove('active');
            document.getElementById('formFoto').classList.remove('active');
            document.getElementById('formTanggal').classList.remove('active');
            document.getElementById('formNarasi').classList.remove('active');
            document.getElementById('formKirim').classList.remove('active');
            
            if (formName === 'desa') {
                document.getElementById('formDesa').classList.add('active');
            } else if (formName === 'foto') {
                document.getElementById('formFoto').classList.add('active');
            } else if (formName === 'tanggal') {
                document.getElementById('formTanggal').classList.add('active');
            } else if (formName === 'narasi') {
                document.getElementById('formNarasi').classList.add('active');
            } else if (formName === 'kirim') {
                document.getElementById('formKirim').classList.add('active');
            }
        }

        function closeForm(formName) {
            document.getElementById('mainMenu').classList.remove('hidden');
            document.getElementById('formDesa').classList.remove('active');
            document.getElementById('formFoto').classList.remove('active');
            document.getElementById('formTanggal').classList.remove('active');
            document.getElementById('formNarasi').classList.remove('active');
            document.getElementById('formKirim').classList.remove('active');
            
            updateStampInfo();
        }

        function goToMainMenu() {
            document.getElementById('mainMenu').classList.remove('hidden');
            document.getElementById('formDesa').classList.remove('active');
            document.getElementById('formFoto').classList.remove('active');
            document.getElementById('formTanggal').classList.remove('active');
            document.getElementById('formNarasi').classList.remove('active');
            document.getElementById('formKirim').classList.remove('active');
        }

        // ==================== DESA ====================
        function loadSelectedDesa() {
            const select = document.getElementById('selectDesa');
            selectedDesa = select.value;
            document.getElementById('previewDesa').innerHTML = '<i class="fas fa-check-circle"></i> ' + (selectedDesa || '');
            
            if (selectedDesa) {
                selectedCoord = getRandomCoordForDesa(selectedDesa);
                document.getElementById('coordDisplay').textContent = selectedCoord;
            }
            
            updateStampInfo();
        }

        // ==================== GAMBAR ====================
        function previewImage() {
            const file = document.getElementById('gambar').files[0];
            if (file) {
                document.getElementById('previewGambar').innerHTML = '<i class="fas fa-check-circle"></i> ' + file.name;
                const reader = new FileReader();
                reader.onload = function(e) {
                    img = new Image();
                    img.src = e.target.result;
                    img.onload = function() {
                        updateMainCanvas();
                    };
                };
                reader.readAsDataURL(file);
            }
        }

        // ==================== TANGGAL & WAKTU ====================
        function updateDateTime() {
            const tglInput = document.getElementById('tanggalWaktu').value;
            if (tglInput) {
                selectedDate = new Date(tglInput);
                selectedDate.setSeconds(Math.floor(Math.random() * 60));
                
                const options = { 
                    day: '2-digit', 
                    month: 'long', 
                    year: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit',
                    hour12: false
                };
                
                document.getElementById('previewTanggal').innerHTML = '<i class="fas fa-calendar-check"></i> ' + 
                    selectedDate.toLocaleDateString('id-ID', options);
                
                updateStampInfo();
            }
        }

        // ==================== RESET ====================
        function resetAllData() {
            if (confirm('Reset semua data?')) {
                img = new Image();
                selectedDesa = "";
                selectedCoord = "";
                narasiText = "";
                selectedDate = new Date();
                
                document.getElementById('gambar').value = '';
                document.getElementById('narasi').value = '';
                document.getElementById('selectDesa').value = '';
                document.getElementById('previewGambar').innerHTML = '';
                document.getElementById('previewDesa').innerHTML = '';
                document.getElementById('previewTanggal').innerHTML = '';
                document.getElementById('coordDisplay').textContent = 'Koordinat akan muncul otomatis';
                
                document.getElementById('runningText').innerHTML = '<i class="fas fa-chevron-right"></i> Belum ada narasi <i class="fas fa-chevron-left"></i>';
                
                const now = new Date();
                selectedDate = now;
                document.getElementById('tanggalWaktu').value = now.toISOString().slice(0, 16);
                
                updateStampInfo();
                drawDefaultCanvas();
                
                showToast('Semua data direset');
            }
        }

        // ==================== SUBMIT ====================
        async function processSubmission() {
            if (!selectedDesa) {
                showToast('Pilih desa dulu');
                return;
            }
            
            if (!img.src || !img.complete) {
                showToast('Upload foto dulu');
                return;
            }

            const canvas = document.getElementById('mainCanvas');
            const imgData = canvas.toDataURL('image/png').split(',')[1];
            const narasi = document.getElementById('narasi').value || '-';
            const date = selectedDate;

            const namaFile = selectedDesa.replace(/[^a-z0-9]/gi, '_') + '_' + 
                            date.getDate() + '_' + (date.getMonth()+1) + '_' +
                            date.getHours() + date.getMinutes() + date.getSeconds();

            const zip = new JSZip();
            zip.file(namaFile + '.txt', narasi);
            zip.file(namaFile + '.png', imgData, { base64: true });

            zip.generateAsync({ type: 'blob' }).then(async function(content) {
                const reader = new FileReader();
                reader.readAsDataURL(content);
                reader.onload = async function() {
                    const base64Data = reader.result.split(',')[1];
                    
                    showToast('Mengirim ke Telegram & Drive...');
                    
                    const result = await uploadToTelegramAndDrive(base64Data, namaFile + '.zip', selectedDesa);
                    
                    if (result.success) {
                        document.getElementById('kirimStatus').innerHTML = '<i class="fas fa-check-circle"></i> Terkirim!';
                        showToast('Terkirim ke Telegram & Drive!');
                        
                        setTimeout(() => {
                            goToMainMenu();
                        }, 1500);
                    } else {
                        document.getElementById('kirimStatus').innerHTML = '<i class="fas fa-times-circle"></i> Gagal!';
                        showToast('Gagal kirim');
                    }
                };
            });
        }

        // ==================== TOAST ====================
        function showToast(msg) {
            const toast = document.getElementById('toastMessage');
            toast.textContent = msg;
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 2000);
        }

        // ==================== WINDOW EXPORTS ====================
        window.openForm = openForm;
        window.closeForm = closeForm;
        window.goToMainMenu = goToMainMenu;
        window.loadSelectedDesa = loadSelectedDesa;
        window.previewImage = previewImage;
        window.updateDateTime = updateDateTime;
        window.updateNarasi = updateNarasi;
        window.processSubmission = processSubmission;
        window.resetAllData = resetAllData;
    </script>
</body>
</html>
